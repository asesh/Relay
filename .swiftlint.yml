disabled_rules:
  - trailing_whitespace
  - line_length
  
opt_in_rules:
  - empty_count
  - empty_string
  - explicit_init
  - first_where
  - sorted_first_last
  
excluded:
  - Pods
  - DerivedData
  - .build
  - vendor
  
line_length:
  warning: 150
  error: 200
  
function_body_length:
  warning: 60
  error: 100
  
type_body_length:
  warning: 300
  error: 500
  
file_length:
  warning: 500
  error: 1000
  
identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - URL
    - url
    
type_name:
  min_length: 3
  max_length:
    warning: 40
    error: 50
    
reporter: "xcode"
